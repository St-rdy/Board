# ===== 공통 설정 =====
spring:
  application:
    name: Board

---
# ===== 운영(prod/default) 프로파일 =====
spring:
  config:
    activate:
      on-profile: "!test"
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}

---
# ===== test 프로파일 =====
spring:
  config:
    activate:
      on-profile: "test"

  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true

jwt:
  secret: this-is-a-test-jwt-secret-key-must-be-longer-than-32-characters!!